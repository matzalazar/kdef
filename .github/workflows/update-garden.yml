# =============================================================================
# kdef — Pipeline de actualización automática del jardín de conocimiento
#
# Este workflow orquesta el ciclo completo:
#   1. Descargar materiales de Moodle
#   2. Generar resúmenes con LLM
#   3. Hacer commit de los .md generados
#   4. Buildear Quartz y desplegar a Cloudflare Pages
#
# Disparadores:
#   - Cron semanal: lunes 3am UTC (fuera del horario de uso de la plataforma)
#   - Manual: workflow_dispatch desde la UI de GitHub (útil para pruebas)
# =============================================================================

name: Actualizar jardín de conocimiento

on:
  schedule:
    # Lunes y jueves a las 03:00 UTC — dos corridas por semana para aprovechar el límite diario
    - cron: '0 3 * * 1'
    - cron: '0 3 * * 4'

  # Permite disparar el workflow manualmente desde la UI de GitHub
  # Útil para el primer run, para pruebas, o para re-procesar contenido
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo dry-run (no hace commit ni deploy)'
        required: false
        default: false
        type: boolean
      force_reprocess:
        description: 'Forzar re-procesamiento de todos los documentos (ignora manifest)'
        required: false
        default: false
        type: boolean

# Permisos mínimos necesarios para el workflow
permissions:
  contents: write   # Necesario para hacer commit de los .md generados
  pages: write      # Necesario para GitHub Pages (si se usa como fallback)
  id-token: write   # Necesario para autenticación OIDC con Cloudflare

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: update-content
  # Ejecuta el pipeline Python para descargar materiales de Moodle,
  # generar resúmenes con LLM, y hacer commit de los archivos .md
  # ---------------------------------------------------------------------------
  update-content:
    name: Actualizar contenido (scraping + LLM)
    runs-on: ubuntu-latest

    # Timeout generoso — el scraping y las llamadas a LLM pueden tardar
    timeout-minutes: 45

    steps:
      # Checkout con credenciales para poder hacer commit al final
      - name: Checkout del repositorio
        uses: actions/checkout@v6
        with:
          # Fetch completo del historial para que git log funcione en Quartz
          fetch-depth: 0
          # Token con permisos de escritura para el commit final
          token: ${{ secrets.GITHUB_TOKEN }}

      # Configurar Python con caché de dependencias para acelerar runs sucesivos
      - name: Configurar Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      # Instalar dependencias del pipeline
      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # Conectar el runner a Tailscale usando la Pi como exit node
      # El tráfico hacia Moodle sale desde la IP residencial de la Pi (100.109.72.5)
      # en vez de los rangos de AWS que Moodle puede bloquear
      - name: Conectar a Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configurar exit node (raspberrypi)
        run: sudo tailscale set --exit-node=100.109.72.5

      # Verificar que Tailscale está activo y el tráfico sale por la Pi
      - name: Verificar conexión Tailscale y egress IP
        run: |
          echo "=== Estado de Tailscale ==="
          tailscale status
          echo ""
          echo "=== IP pública de egreso ==="
          curl -s https://ipinfo.io/json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'IP: {d[\"ip\"]} | Org: {d.get(\"org\",\"?\")} | Ciudad: {d.get(\"city\",\"?\")} ({d.get(\"country\",\"?\")})')"
          echo ""
          echo "=== Conectividad a Moodle ==="
          curl -s -o /dev/null -w "HTTP %{http_code} — tiempo: %{time_total}s\n" --max-time 15 "${{ secrets.MOODLE_URL }}/login/index.php" || echo "ERROR: Moodle no es alcanzable"

      # Ejecutar el pipeline principal
      # Las variables de entorno se inyectan desde los secrets del repositorio
      # DRY_RUN y FORCE_REPROCESS vienen del input del workflow_dispatch
      - name: Ejecutar pipeline de actualización
        env:
          MOODLE_URL: ${{ secrets.MOODLE_URL }}
          MOODLE_USER: ${{ secrets.MOODLE_USER }}
          MOODLE_PASS: ${{ secrets.MOODLE_PASS }}
          MODELS_API_KEY: ${{ secrets.MODELS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Modo dry-run: el pipeline corre pero no escribe archivos ni hace commit
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # Forzar re-procesamiento: ignora el manifest y procesa todo de nuevo
          FORCE_REPROCESS: ${{ github.event.inputs.force_reprocess || 'false' }}
        run: |
          python scripts/pipeline.py

      # Configurar identidad de git para el commit automático
      - name: Configurar identidad git para commit automático
        run: |
          git config user.name "kdef-bot"
          git config user.email "kdef-bot@users.noreply.github.com"

      # Hacer commit y push de los archivos generados si hay cambios
      # El --allow-empty=false asegura que no se haga un commit vacío
      # si no hubo documentos nuevos para procesar
      - name: Commit y push de contenido actualizado
        run: |
          git add content/notas-automaticas/ data/manifest.json content/index.md || true
          if git diff --staged --quiet; then
            echo "No hay cambios nuevos — el manifest indica que todo está actualizado."
          else
            git commit -m "auto: actualizar contenido generado [$(date -u '+%Y-%m-%d')]"
            git push origin main
          fi

  # ---------------------------------------------------------------------------
  # JOB 2: build-and-deploy
  # Buildea Quartz y despliega el sitio a Cloudflare Pages
  # Depende de update-content para asegurar que corre con el contenido más nuevo
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build Quartz + Deploy a Cloudflare Pages
    runs-on: ubuntu-latest
    needs: update-content

    # Timeout para el build de Quartz — puede tardar en repos grandes
    timeout-minutes: 20

    steps:
      # Checkout fresh después del commit de update-content
      # ref: main garantiza que se obtiene HEAD actual, incluyendo el commit de notas
      - name: Checkout del repositorio (con contenido actualizado)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      # Node.js LTS con caché de npm para acelerar la instalación
      - name: Configurar Node.js 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Instalar dependencias de Quartz
      - name: Instalar dependencias de Quartz
        run: npm ci

      # Build de Quartz — genera el sitio estático en public/
      - name: Build del sitio (Quartz)
        run: npx quartz build
        env:
          # NODE_ENV production optimiza el output del build
          NODE_ENV: production

      # Deploy a Cloudflare Pages usando Wrangler
      # El directorio de output de Quartz es 'public/'
      - name: Deploy a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public/ --project-name=kdef --branch=main
